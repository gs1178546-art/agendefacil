<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AgendeFácil</title>
    <meta name="description" content="Acesse sua conta AgendeFácil para gerenciar seus agendamentos.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        /* Animated background blobs */
        .login-page::before,
        .login-page::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            z-index: 0;
            animation: float 8s ease-in-out infinite;
        }
        .login-page::before {
            width: 400px; height: 400px;
            background: var(--primary);
            top: -100px; left: -100px;
        }
        .login-page::after {
            width: 350px; height: 350px;
            background: #a855f7;
            bottom: -80px; right: -80px;
            animation-delay: 4s;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -30px); }
        }

        .login-card {
            width: 100%;
            max-width: 440px;
            padding: 2.5rem;
            position: relative;
            z-index: 1;
        }

        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-logo .logo {
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        .login-logo p {
            color: var(--secondary);
            font-size: 0.95rem;
        }

        /* Auth Tabs */
        .auth-tabs {
            display: flex;
            background: rgba(99, 102, 241, 0.08);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 2rem;
        }
        .auth-tab {
            flex: 1;
            padding: 0.7rem;
            text-align: center;
            border: none;
            background: transparent;
            border-radius: 10px;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--secondary);
            cursor: pointer;
            transition: all 0.25s;
        }
        .auth-tab.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
        }

        .auth-form { display: none; }
        .auth-form.active { display: block; animation: fadeIn 0.3s ease; }

        /* Role Selector */
        .role-selector {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .role-option {
            flex: 1;
            padding: 1rem;
            border: 2px solid var(--border);
            border-radius: 14px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s;
            background: transparent;
        }
        body.dark-theme .role-option {
            border-color: var(--border-dark);
        }
        .role-option:hover {
            border-color: var(--primary);
        }
        .role-option.selected {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
        }
        .role-option i {
            display: block;
            margin: 0 auto 0.5rem;
            color: var(--primary);
        }
        .role-option span {
            font-weight: 600;
            font-size: 0.9rem;
        }
        .role-option small {
            display: block;
            color: var(--secondary);
            font-size: 0.75rem;
            margin-top: 0.25rem;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
            color: var(--secondary);
            font-size: 0.85rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        body.dark-theme .divider::before,
        body.dark-theme .divider::after {
            background: var(--border-dark);
        }

        .error-message {
            background: rgba(244, 63, 94, 0.1);
            color: var(--accent);
            padding: 0.75rem 1rem;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
            align-items: center;
            gap: 0.5rem;
        }
        .error-message.visible {
            display: flex;
        }

        .success-msg {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            padding: 0.75rem 1rem;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
            align-items: center;
            gap: 0.5rem;
        }
        .success-msg.visible {
            display: flex;
        }

        .form-footer {
            text-align: center;
            margin-top: 1.25rem;
            font-size: 0.85rem;
            color: var(--secondary);
        }
        .form-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        .form-footer a:hover { text-decoration: underline; }

        .password-wrapper {
            position: relative;
        }
        .password-wrapper input {
            padding-right: 45px;
        }
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--secondary);
            padding: 4px;
        }
    </style>
</head>
<body class="dark-theme">

    <div class="login-page">
        <div class="login-card glass">
            <!-- Logo -->
            <div class="login-logo">
                <div class="logo">
                    <i data-lucide="calendar-check-2"></i>
                    <span>Agende<span class="logo-accent">Fácil</span></span>
                </div>
                <p>Acesse sua conta para continuar</p>
            </div>

            <!-- Auth Tabs -->
            <div class="auth-tabs">
                <button class="auth-tab active" data-form="login">Entrar</button>
                <button class="auth-tab" data-form="register">Criar Conta</button>
            </div>

            <!-- ========== LOGIN FORM ========== -->
            <form id="login-form" class="auth-form active">
                <div id="login-error" class="error-message">
                    <i data-lucide="alert-circle" style="width:16px;height:16px;flex-shrink:0;"></i>
                    <span id="login-error-text">E-mail ou senha incorretos.</span>
                </div>

                <div class="form-group">
                    <label for="login-email">E-mail</label>
                    <input type="email" id="login-email" required placeholder="seu@email.com">
                </div>

                <div class="form-group">
                    <label for="login-password">Senha</label>
                    <div class="password-wrapper">
                        <input type="password" id="login-password" required placeholder="••••••••">
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility('login-password', this)">
                            <i data-lucide="eye" style="width:18px;height:18px;"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-primary full-width">
                    <i data-lucide="log-in" style="width:18px;height:18px;"></i> Entrar
                </button>

                <div class="form-footer">
                    Não tem conta? <a onclick="switchTab('register')">Crie agora</a>
                </div>
            </form>

            <!-- ========== REGISTER FORM ========== -->
            <form id="register-form" class="auth-form">
                <div id="register-error" class="error-message">
                    <i data-lucide="alert-circle" style="width:16px;height:16px;flex-shrink:0;"></i>
                    <span id="register-error-text">Erro ao criar conta.</span>
                </div>
                <div id="register-success" class="success-msg">
                    <i data-lucide="check-circle" style="width:16px;height:16px;flex-shrink:0;"></i>
                    <span>Conta criada com sucesso! Faça login.</span>
                </div>



                <div class="form-group">
                    <label for="register-name">Nome Completo</label>
                    <input type="text" id="register-name" required placeholder="Ex: João Silva">
                </div>

                <div class="form-group">
                    <label for="register-email">E-mail</label>
                    <input type="email" id="register-email" required placeholder="seu@email.com">
                </div>

                <div class="form-group">
                    <label for="register-phone">WhatsApp</label>
                    <input type="tel" id="register-phone" placeholder="(11) 99999-9999">
                </div>

                <div class="form-group">
                    <label for="register-password">Senha</label>
                    <div class="password-wrapper">
                        <input type="password" id="register-password" required placeholder="Mínimo 6 caracteres" minlength="6">
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility('register-password', this)">
                            <i data-lucide="eye" style="width:18px;height:18px;"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="register-confirm">Confirmar Senha</label>
                    <div class="password-wrapper">
                        <input type="password" id="register-confirm" required placeholder="Repita a senha">
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility('register-confirm', this)">
                            <i data-lucide="eye" style="width:18px;height:18px;"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-primary full-width">
                    <i data-lucide="user-plus" style="width:18px;height:18px;"></i> Criar Conta
                </button>

                <div class="form-footer">
                    Já tem conta? <a onclick="switchTab('login')">Faça login</a>
                </div>
            </form>
        </div>
    </div>

    <script src="login.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
