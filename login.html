<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AgendeFácil</title>
    <meta name="description" content="Acesse sua conta AgendeFácil para gerenciar seus agendamentos.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>

    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        /* Animated background blobs */
        .login-page::before,
        .login-page::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            z-index: 0;
            animation: float 8s ease-in-out infinite;
        }
        .login-page::before {
            width: 400px; height: 400px;
            background: var(--primary);
            top: -100px; left: -100px;
        }
        .login-page::after {
            width: 350px; height: 350px;
            background: #a855f7;
            bottom: -80px; right: -80px;
            animation-delay: 4s;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -30px); }
        }

        .login-card {
            width: 100%;
            max-width: 440px;
            padding: 2.5rem;
            position: relative;
            z-index: 1;
        }

        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-logo .logo {
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        .login-logo p {
            color: var(--secondary);
            font-size: 0.95rem;
        }

        /* Auth Tabs */
        .auth-tabs {
            display: flex;
            background: rgba(99, 102, 241, 0.08);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 2rem;
        }
        .auth-tab {
            flex: 1;
            padding: 0.7rem;
            text-align: center;
            border: none;
            background: transparent;
            border-radius: 10px;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--secondary);
            cursor: pointer;
            transition: all 0.25s;
        }
        .auth-tab.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
        }

        .auth-form { display: none; }
        .auth-form.active { display: block; animation: fadeIn 0.3s ease; }

        /* Role Selector */
        .role-selector {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .role-option {
            flex: 1;
            padding: 1rem;
            border: 2px solid var(--border);
            border-radius: 14px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s;
            background: transparent;
        }
        body.dark-theme .role-option {
            border-color: var(--border-dark);
        }
        .role-option:hover {
            border-color: var(--primary);
        }
        .role-option.selected {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
        }
        .role-option i {
            display: block;
            margin: 0 auto 0.5rem;
            color: var(--primary);
        }
        .role-option span {
            font-weight: 600;
            font-size: 0.9rem;
        }
        .role-option small {
            display: block;
            color: var(--secondary);
            font-size: 0.75rem;
            margin-top: 0.25rem;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
            color: var(--secondary);
            font-size: 0.85rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        body.dark-theme .divider::before,
        body.dark-theme .divider::after {
            background: var(--border-dark);
        }

        .error-message {
            background: rgba(244, 63, 94, 0.1);
            color: var(--accent);
            padding: 0.75rem 1rem;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
            align-items: center;
            gap: 0.5rem;
        }
        .error-message.visible {
            display: flex;
        }

        .success-msg {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            padding: 0.75rem 1rem;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
            align-items: center;
            gap: 0.5rem;
        }
        .success-msg.visible {
            display: flex;
        }

        .form-footer {
            text-align: center;
            margin-top: 1.25rem;
            font-size: 0.85rem;
            color: var(--secondary);
        }
        .form-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        .form-footer a:hover { text-decoration: underline; }

        .password-wrapper {
            position: relative;
        }
        .password-wrapper input {
            padding-right: 45px;
        }
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--secondary);
            padding: 4px;
        }
    </style>
</head>
<body class="dark-theme">

    <div class="login-page">
        <div class="login-card glass">
            <!-- Logo -->
            <div class="login-logo">
                <div class="logo">
                    <i data-lucide="calendar-check-2"></i>
                    <span>Agende<span class="logo-accent">Fácil</span></span>
                </div>
                <p>Acesse sua conta para continuar</p>
            </div>

            <!-- Auth Tabs -->
            <div class="auth-tabs">
                <button class="auth-tab active" data-form="login">Entrar</button>
                <button class="auth-tab" data-form="register">Criar Conta</button>
            </div>

            <!-- ========== LOGIN FORM ========== -->
            <form id="login-form" class="auth-form active">
                <!-- Social Login -->
                <div class="social-login">
                    <button type="button" class="btn-social btn-google" id="google-login-btn">
                        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/><path fill="#FF3D00" d="m6.306 14.691 6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/><path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/></svg>
                        Entrar com Google
                    </button>
                    <button type="button" class="btn-social btn-facebook" id="facebook-login-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                        Entrar com Facebook
                    </button>
                </div>

                <div class="divider">ou entre com e-mail</div>

                <div id="login-error" class="error-message">
                    <i data-lucide="alert-circle" style="width:16px;height:16px;flex-shrink:0;"></i>
                    <span id="login-error-text">E-mail ou senha incorretos.</span>
                </div>

                <div class="form-group">
                    <label for="login-email">E-mail</label>
                    <input type="email" id="login-email" required placeholder="seu@email.com">
                </div>

                <div class="form-group">
                    <label for="login-password">Senha</label>
                    <div class="password-wrapper">
                        <input type="password" id="login-password" required placeholder="••••••••">
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility('login-password', this)">
                            <i data-lucide="eye" style="width:18px;height:18px;"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-primary full-width" id="login-submit-btn">
                    <i data-lucide="log-in" style="width:18px;height:18px;"></i> Entrar
                </button>

                <div class="form-footer">
                    Não tem conta? <a onclick="switchTab('register')">Crie agora</a>
                </div>
            </form>

            <!-- ========== REGISTER FORM ========== -->
            <form id="register-form" class="auth-form">
                <div id="register-error" class="error-message">
                    <i data-lucide="alert-circle" style="width:16px;height:16px;flex-shrink:0;"></i>
                    <span id="register-error-text">Erro ao criar conta.</span>
                </div>
                <div id="register-success" class="success-msg">
                    <i data-lucide="check-circle" style="width:16px;height:16px;flex-shrink:0;"></i>
                    <span>Conta criada com sucesso! Faça login.</span>
                </div>



                <div class="form-group">
                    <label for="register-name">Nome Completo</label>
                    <input type="text" id="register-name" required placeholder="Ex: João Silva">
                </div>

                <div class="form-group">
                    <label for="register-email">E-mail</label>
                    <input type="email" id="register-email" required placeholder="seu@email.com">
                </div>

                <div class="form-group">
                    <label for="register-phone">WhatsApp</label>
                    <input type="tel" id="register-phone" placeholder="(11) 99999-9999">
                </div>

                <div class="form-group">
                    <label for="register-password">Senha</label>
                    <div class="password-wrapper">
                        <input type="password" id="register-password" required placeholder="Mínimo 6 caracteres" minlength="6">
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility('register-password', this)">
                            <i data-lucide="eye" style="width:18px;height:18px;"></i>
                        </button>
                    </div>
                    <div id="password-strength" class="">
                        <div class="password-strength-bar"><div class="password-strength-fill"></div></div>
                        <span class="strength-label" id="strength-text"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="register-confirm">Confirmar Senha</label>
                    <div class="password-wrapper">
                        <input type="password" id="register-confirm" required placeholder="Repita a senha">
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility('register-confirm', this)">
                            <i data-lucide="eye" style="width:18px;height:18px;"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-primary full-width">
                    <i data-lucide="user-plus" style="width:18px;height:18px;"></i> Criar Conta
                </button>

                <div class="form-footer">
                    Já tem conta? <a onclick="switchTab('login')">Faça login</a>
                </div>
            </form>
        </div>
    </div>

    <script src="login.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
